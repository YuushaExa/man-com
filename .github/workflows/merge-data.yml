name: Merge and Cleanup List Data

on:
  push:
    branches:
      - main  # ← Change to your default branch
    paths:
      - 'data.json'
      - 'list/**/*.json'  # ← Critical: trigger when new files appear in list/

jobs:
  process-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0  # ← Needed for pull/rebase

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Merge and Cleanup Script
        run: |
          python3 << 'PYEOF'
          import os, json, glob, sys

          MASTER = 'list.json'
          FOLDER = 'list'

          # Load master
          master = {}
          if os.path.exists(MASTER):
              try:
                  with open(MASTER, 'r') as f:
                      master = json.load(f)
              except:
                  master = {}

          # Process all JSON files in list/
          files = glob.glob(os.path.join(FOLDER, '*.json'))
          done = []

          for fp in files:
              try:
                  with open(fp, 'r') as f:
                      data = json.load(f)
                  for k, new_v in data.items():
                      cur_v = master.get(k)
                      update = False
                      if cur_v == "?":
                          update = (new_v != "?")
                      elif new_v == "?":
                          update = False
                      else:
                          try:
                              if float(new_v) > float(cur_v):
                                  update = True
                          except:
                              update = True  # fallback for non-numeric
                      if update:
                          master[k] = new_v
                          print(f"✓ {k}: {cur_v} → {new_v}")
                  done.append(fp)
              except Exception as e:
                  print(f"⚠ Error {fp}: {e}", file=sys.stderr)

          # Save master
          with open(MASTER, 'w') as f:
              json.dump(master, f, indent=2)
          print(f"💾 Saved {MASTER}")

          # Delete processed files
          for fp in done:
              os.remove(fp)
              print(f"🗑 Deleted {fp}")
          PYEOF

      - name: Commit and Push Changes
        run: |
          git add list.json
          git add list/*.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: merge chapters and cleanup [skip ci]"
            git pull --rebase origin ${{ github.ref_name }} || true
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "ℹ️ No changes to commit"
          fi
