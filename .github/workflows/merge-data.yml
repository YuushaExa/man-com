name: Merge and Cleanup List Data

on:
  workflow_dispatch:
  push:
    branches:
      - main  # ← Change to your default branch
    paths:
      - 'list/*.json'  

jobs:
  process-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0  # ← Needed for pull/rebase

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Merge and Cleanup Script
        run: |
          python3 << 'PYEOF'
          import os, json, glob, sys

          MASTER = 'list.json'
          FOLDER = 'list'

          # Load master
          master = {}
          if os.path.exists(MASTER):
              try:
                  with open(MASTER, 'r') as f:
                      master = json.load(f)
              except:
                  master = {}

          # Process all JSON files in list/
          files = glob.glob(os.path.join(FOLDER, '*.json'))
          done = []

          def is_numeric(v):
              """Check if a value can be converted to float"""
              try:
                  float(v)
                  return True
              except (ValueError, TypeError):
                  return False

          for fp in files:
              try:
                  with open(fp, 'r') as f:
                      data = json.load(f)
                  for k, new_v in data.items():
                      cur_v = master.get(k)
                      update = False

                      # ✅ 1. New key → always add (any value: "?", text, number, etc.)
                      if cur_v is None:
                          update = True

                      # ✅ 2. Existing key: never downgrade to "?"
                      elif new_v == "?":
                          update = False

                      # ✅ 3. Current is "?" → replace with anything (including another "?", though redundant)
                      elif cur_v == "?":
                          update = True

                      # ✅ 4. Both numeric → keep the higher value
                      elif is_numeric(cur_v) and is_numeric(new_v):
                          if float(new_v) > float(cur_v):
                              update = True

                      # ✅ 5. Non-numeric or mixed types → prefer new value (store anything)
                      else:
                          update = True

                      if update:
                          master[k] = new_v
                          print(f"✓ {k}: {repr(cur_v)} → {repr(new_v)}")
                  done.append(fp)
              except Exception as e:
                  print(f"⚠ Error {fp}: {e}", file=sys.stderr)

          # Save master with proper formatting
          with open(MASTER, 'w') as f:
              json.dump(master, f, indent=2, ensure_ascii=False, sort_keys=True)
          print(f"💾 Saved {MASTER} ({len(master)} entries)")

          # Delete processed files
          for fp in done:
              os.remove(fp)
              print(f"🗑 Deleted {fp}")
          PYEOF

      - name: Commit and Push Changes
        run: |
          git add list.json
          git add list/*.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: merge chapters and cleanup [skip ci]"
            git pull --rebase origin ${{ github.ref_name }} || true
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "ℹ️ No changes to commit"
          fi
