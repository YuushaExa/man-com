# .github/workflows/manga-downloader.yml
name: Manga Downloader

on:
  workflow_dispatch:
    inputs:
      json_file:
        description: 'Path to data.json file'
        required: false
        default: 'data.json'

jobs:
  download-manga:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl zip

      - name: Setup download script
        run: |
          cat > download_manga.sh << 'SCRIPT'
          #!/bin/bash
          set -e
          
          JSON_FILE="${1:-data.json}"
          
          # Read manga info - FIXED: hyphen escaped in sed pattern
          MANGA_TITLE=$(jq -r '.manga.title' "$JSON_FILE" | sed 's/[^a-zA-Z0-9._\-]/_/g')
          echo "📚 Downloading: $MANGA_TITLE"
          
          # Create base directory
          BASE_DIR="${MANGA_TITLE}"
          mkdir -p "$BASE_DIR"
          
          # Get total chapters for progress
          TOTAL_CHAPTERS=$(jq '.chapters | length' "$JSON_FILE")
          echo "📦 Total chapters: $TOTAL_CHAPTERS"
          
          # Process each chapter
          jq -c '.chapters[]' "$JSON_FILE" | while read -r chapter; do
            # Extract chapter info
            CHAPTER_NUM=$(echo "$chapter" | jq -r '.number')
            PAGES_COUNT=$(echo "$chapter" | jq -r '.pages_count')
            CHAPTER_NAME=$(echo "$chapter" | jq -r '.name // empty')
            
            # Format chapter folder name (zero-padded for sorting)
            CHAPTER_PADDED=$(printf "%03d" "$CHAPTER_NUM")
            if [ -n "$CHAPTER_NAME" ]; then
              # FIXED: hyphen escaped in sed pattern
              CHAPTER_DIR="${BASE_DIR}/Chapter_${CHAPTER_PADDED}_$(echo "$CHAPTER_NAME" | sed 's/[^a-zA-Z0-9._\-]/_/g')"
            else
              CHAPTER_DIR="${BASE_DIR}/Chapter_${CHAPTER_PADDED}"
            fi
            
            mkdir -p "$CHAPTER_DIR"
            
            echo "⬇️  Chapter $CHAPTER_NUM: $CHAPTER_DIR ($PAGES_COUNT pages)"
            
            # Download each page
            PAGE_INDEX=0
            echo "$chapter" | jq -r '.images[]' | while read -r image_url; do
              PAGE_INDEX=$((PAGE_INDEX + 1))
              
              # Clean URL (remove trailing whitespace)
              IMAGE_URL=$(echo "$image_url" | xargs)
              
              # Format page filename (zero-padded)
              PAGE_PADDED=$(printf "%03d" "$PAGE_INDEX")
              OUTPUT_FILE="${CHAPTER_DIR}/${PAGE_PADDED}.webp"
              
              # Download with headers
              curl -sL \
                -H "Referer: https://comix.to/" \
                -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                "$IMAGE_URL" \
                -o "$OUTPUT_FILE" \
                --retry 3 \
                --retry-delay 2 \
                --connect-timeout 30
              
              echo -n "."
            done
            echo " ✅ Done"
          done
          
          echo "🗜️  Creating zip archive..."
          zip -rq "${MANGA_TITLE}.zip" "$BASE_DIR"
          
          echo "✨ Download complete: ${MANGA_TITLE}.zip"
          echo "MANGA_OUTPUT=${MANGA_TITLE}.zip" >> $GITHUB_ENV
          SCRIPT
          
          chmod +x download_manga.sh

      - name: Download manga
        run: |
          ./download_manga.sh "${{ github.event.inputs.json_file }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: manga-download
          path: ${{ env.MANGA_OUTPUT }}
          retention-days: 9
          compression-level: 9

      - name: Summary
        run: |
          if [ -f "${{ env.MANGA_OUTPUT }}" ]; then
            echo "## ✅ Download Complete" >> $GITHUB_STEP_SUMMARY
            echo "- 📦 Archive: \`${{ env.MANGA_OUTPUT }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- 📁 Size: $(du -h "${{ env.MANGA_OUTPUT }}" | cut -f1)" >> $GITHUB_STEP_SUMMARY
          fi
