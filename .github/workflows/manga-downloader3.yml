name: Manga Downloader → Telegram

on:
  workflow_dispatch:
    inputs:
      json_file:
        description: 'Path to data.json file'
        required: false
        default: 'data.json'
      optimize_images:
        description: 'Optimize with Sharp (WebP, quality: 75, effort: 4)'
        required: false
        type: boolean
        default: true
  push:
    paths:
      - 'data.json'

jobs:
  download-and-send:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl zip

      - name: Install npm dependencies
        run: npm install  # Use install (not ci) since no lockfile

      - name: Run downloader + Telegram sender
        id: downloader
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          node basic.js \
            "${{ github.event.inputs.json_file || 'data.json' }}" \
            "${{ github.event.inputs.optimize_images || true }}" 2>&1 | tee output.log

      - name: Parse Summary
        id: summary
        run: |
          echo "=== Debug: output.log summary lines ==="
          grep -E '⏱️|📥|📦|🔗' output.log || echo "No matches found"
          echo "========================================"
          
          DURATION=$(grep -oP '⏱️\s*Total time:\s*\K[0-9.]+' output.log | head -1 | xargs)
          DOWNLOADS=$(grep -oP '📥\s*Downloads:\s*\K[0-9]+' output.log | head -1 | xargs)
          TOTAL_OUTPUT=$(grep -oP '📦\s*Total output size:\s*\K[0-9.]+' output.log | head -1 | xargs)
          
          MANGA_LINE=$(grep '🔗 Manga' output.log | head -1)
          MANGA_ID=$(echo "$MANGA_LINE" | sed -n 's/.*Manga: \([a-zA-Z0-9_-]*\).*/\1/p' | xargs)
          CHAPTER=$(echo "$MANGA_LINE" | sed -n 's/.*Ch\.\([0-9]*\).*/\1/p' | xargs)
          
          DURATION=${DURATION:-0}
          DOWNLOADS=${DOWNLOADS:-0}
          TOTAL_OUTPUT=${TOTAL_OUTPUT:-0}
          MANGA_ID=${MANGA_ID:-N/A}
          CHAPTER=${CHAPTER:-0}
          
          echo "Parsed: duration=$DURATION, downloads=$DOWNLOADS, output=$TOTAL_OUTPUT, manga=$MANGA_ID, chapter=$CHAPTER"
          
          echo "duration=$DURATION" >> $GITHUB_OUTPUT
          echo "downloads=$DOWNLOADS" >> $GITHUB_OUTPUT
          echo "manga_id=$MANGA_ID" >> $GITHUB_OUTPUT
          echo "chapter=$CHAPTER" >> $GITHUB_OUTPUT
          echo "total_output=$TOTAL_OUTPUT" >> $GITHUB_OUTPUT

      - name: Merge status.json and list.json
        run: |
          echo "=== GitHub Outputs ==="
          echo "manga_id: '${{ steps.summary.outputs.manga_id }}'"
          echo "chapter: '${{ steps.summary.outputs.chapter }}'"
          echo "======================"
          
          node << 'EOF'
            const fs = require('fs');
            
            // Helper: safely parse chapter as integer
            // Returns 1 for invalid/unknown values (so new manga get added)
            const parseChapter = (val) => {
              if (val === null || val === undefined) return 1;
              const num = parseInt(String(val).trim(), 10);
              return isNaN(num) || num < 1 ? 1 : num;
            };
            
            // Helper: safely parse float (avoid shadowing global parseFloat)
            const safeFloat = (val) => {
              if (val === null || val === undefined) return 0;
              const num = Number(String(val).trim());
              return isNaN(num) || num < 0 ? 0 : num;
            };
            
            let mangaId = '${{ steps.summary.outputs.manga_id }}';
            let chapter = parseChapter('${{ steps.summary.outputs.chapter }}');
            const newDownloads = safeFloat('${{ steps.summary.outputs.downloads }}');
            const newDuration = safeFloat('${{ steps.summary.outputs.duration }}');
            const newOutput = safeFloat('${{ steps.summary.outputs.total_output }}');
            
            console.log(`GitHub outputs: mangaId="${mangaId}", chapter=${chapter}`);
            
            // 🎯 Fallback to data.json if GitHub outputs fail
            if (!mangaId || mangaId === 'N/A' || mangaId.trim() === '') {
              console.log('⚠️ GitHub mangaId invalid, reading data.json...');
              try {
                const jsonFile = '${{ github.event.inputs.json_file || 'data.json' }}';
                const data = JSON.parse(fs.readFileSync(jsonFile, 'utf8'));
                const url = data.manga?.url || '';
                const match = url.match(/\/title\/([^-\s\/]+)/);
                mangaId = match ? match[1] : 'N/A';
              } catch (e) {
                console.log(`❌ Failed to read data.json: ${e.message}`);
              }
            }
            
            // Also fallback for chapter if still invalid
            if (chapter < 1) {
              console.log('⚠️ Chapter invalid, trying data.json fallback...');
              try {
                const jsonFile = '${{ github.event.inputs.json_file || 'data.json' }}';
                const data = JSON.parse(fs.readFileSync(jsonFile, 'utf8'));
                const rawChapter = data.manga?.latest_chapter ?? data.manga?.latestChapter ?? data.manga?.chapter;
                chapter = parseChapter(rawChapter);
                console.log(`✅ From data.json: raw="${rawChapter}", parsed=${chapter}`);
              } catch (e) {
                console.log(`⚠️ Fallback failed, keeping chapter=${chapter}`);
              }
            }
            
            mangaId = mangaId ? mangaId.trim() : '';
            console.log(`Final values: mangaId="${mangaId}", chapter=${chapter}`);
            
            // === Update status.json ===
            let status = {};
            if (fs.existsSync('status.json')) {
              try {
                status = JSON.parse(fs.readFileSync('status.json', 'utf8'));
              } catch (e) {
                console.log('⚠️ Could not parse status.json, starting fresh');
              }
            }
            
            const oldDownloads = safeFloat(status.total_downloads);
            const oldDuration = safeFloat(status.total_duration);
            const oldOutput = safeFloat(status.total_output);
            const oldChapters = parseChapter(status.total_chapters);
            
            status.total_downloads = oldDownloads + newDownloads;
            status.total_duration = oldDuration + newDuration;
            status.total_output = oldOutput + newOutput;
            status.total_chapters = oldChapters + chapter;
            status.last_updated = new Date().toISOString();
            
            // Clean up old fields
            delete status.status;
            delete status.icon;
            delete status.timestamp;
            delete status.last_run;
            delete status.latest_chapter;
            delete status.total_output_mb;
            delete status.summary;
            
            fs.writeFileSync('status.json', JSON.stringify(status, null, 2));
            console.log('✅ Updated status.json');
            
            // === Update list.json (ensure object, default chapter=1 for unknown) ===
            let list = {};
            if (fs.existsSync('list.json')) {
              try {
                const parsed = JSON.parse(fs.readFileSync('list.json', 'utf8'));
                if (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) {
                  list = parsed;
                  console.log(`Loaded list.json: ${JSON.stringify(list)}`);
                } else {
                  console.log('⚠️ list.json is array/invalid, starting fresh');
                  list = {};
                }
              } catch (e) {
                console.log('⚠️ Could not parse list.json');
              }
            }
            
            console.log(`Attempting update: mangaId="${mangaId}", chapter=${chapter}`);
            
            if (mangaId && mangaId !== 'N/A' && mangaId.length > 0) {
              const existingChapter = parseChapter(list[mangaId]);
              console.log(`Existing chapter for ${mangaId}: ${existingChapter}`);
              
              // Update if: manga not in list OR new chapter is higher
              if (!list.hasOwnProperty(mangaId) || existingChapter < chapter) {
                list[mangaId] = chapter;
                console.log(`📝 ${!list.hasOwnProperty(mangaId) ? 'Added' : 'Updated'} ${mangaId} → ${chapter} (was ${existingChapter})`);
              } else {
                console.log(`ℹ️ ${mangaId} already at ${existingChapter}, keeping ${Math.max(existingChapter, chapter)}`);
              }
            } else {
              console.log(`⚠️ Skipping list.json update: invalid mangaId="${mangaId}"`);
            }
            
            const listContent = JSON.stringify(list, null, 2);
            fs.writeFileSync('list.json', listContent);
            console.log('✅ Updated list.json');
            console.log(`Final: ${listContent}`);
          EOF
          
          echo "=== status.json ==="
          cat status.json
          echo ""
          echo "=== list.json ==="
          cat list.json
          echo ""
          
          git add status.json list.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: merge stats + update chapters [skip ci]" || true
            git pull --rebase origin ${{ github.ref_name }} || true
            git push origin HEAD:${{ github.ref_name }} || true
          else
            echo "ℹ️ No changes to commit"
          fi

      - name: Cleanup downloaded files
        run: |
          rm -rf node_modules/
          rm -f package-lock.json
          rm -rf *_ds.zip
          rm -rf *_cover.jpg
          rm -rf Miren_no_Tonbo/
          find . -type d -name "*_ds" -exec rm -rf {} + 2>/dev/null || true
          rm -f output.log

      - name: Summary
        if: success()
        run: |
          echo "## ✅ Process Complete" >> $GITHUB_STEP_SUMMARY
          echo "- 📤 Files sent directly to Telegram" >> $GITHUB_STEP_SUMMARY
          echo "- 🗑️ No artifacts saved (Telegram delivery only)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 This Run Summary" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "⏱️ Duration: ${{ steps.summary.outputs.duration }}s" >> $GITHUB_STEP_SUMMARY
          echo "📥 Downloads: ${{ steps.summary.outputs.downloads }}" >> $GITHUB_STEP_SUMMARY
          echo "🎨 Optimizations: ${{ steps.summary.outputs.downloads }}" >> $GITHUB_STEP_SUMMARY
          echo "📦 Output: ${{ steps.summary.outputs.total_output }} MB" >> $GITHUB_STEP_SUMMARY
          echo "🔗 Manga: ${{ steps.summary.outputs.manga_id }} • Ch.${{ steps.summary.outputs.chapter }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📈 Cumulative Stats (status.json)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat status.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📚 Manga List (list.json)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat list.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
