name: Manga Downloader → Telegram

on:
  workflow_dispatch:
    inputs:
      json_file:
        description: 'Path to data.json file'
        required: false
        default: 'data.json'
      optimize_images:
        description: 'Optimize with Sharp (WebP, quality: 75, effort: 4)'
        required: false
        type: boolean
        default: true
  push:
    paths:
      - 'data.json'

jobs:
  download-and-send:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl zip
          npm install

      - name: Run downloader + Telegram sender
        id: downloader
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          node basic.js \
            "${{ github.event.inputs.json_file || 'data.json' }}" \
            "${{ github.event.inputs.optimize_images || true }}" 2>&1 | tee output.log

      - name: Parse Summary & Merge Status
        id: summary
        run: |
          node << 'EOF'
          const fs = require('fs');

          // Read output.log
          const logContent = fs.readFileSync('output.log', 'utf8');
          const lines = logContent.split('\n');

          // Parse values using flexible regex
          let duration = '0';
          let downloadsDone = '0';
          let downloadsTotal = '0';
          let optimDone = '0';
          let optimTotal = '0';
          let mangaName = '';
          let chapterNum = '0';
          let outputSize = '0';
          let outputUnit = 'MB';

          for (const line of lines) {
            // Duration: ⏱️ Duration: 35.7s
            const durationMatch = line.match(/Duration:\s*([0-9.]+)\s*s/i);
            if (durationMatch) duration = durationMatch[1];

            // Downloads: 📥 Downloads: 82/82
            const downloadsMatch = line.match(/Downloads:\s*([0-9]+)\s*\/\s*([0-9]+)/i);
            if (downloadsMatch) {
              downloadsDone = downloadsMatch[1];
              downloadsTotal = downloadsMatch[2];
            }

            // Optimizations: 🎨 Optimizations: 82/82
            const optimMatch = line.match(/Optimizations:\s*([0-9]+)\s*\/\s*([0-9]+)/i);
            if (optimMatch) {
              optimDone = optimMatch[1];
              optimTotal = optimMatch[2];
            }

            // Manga: 🔗 Manga: xkqm7 • Ch.?
            const mangaMatch = line.match(/Manga:\s*([^\s•]+)\s*•\s*Ch\.([0-9.]+|\?)/i);
            if (mangaMatch) {
              mangaName = mangaMatch[1].trim();
              chapterNum = mangaMatch[2] === '?' ? '0' : mangaMatch[2];
            }

            // Output: 📦 Total output: 13.38 MB
            const outputMatch = line.match(/Total output:\s*([0-9.]+)\s*(MB|GB)/i);
            if (outputMatch) {
              outputSize = outputMatch[1];
              outputUnit = outputMatch[2].toUpperCase();
            }
          }

          // Write to GITHUB_OUTPUT
          const output = [
            `duration=${duration}`,
            `downloads_done=${downloadsDone}`,
            `downloads_total=${downloadsTotal}`,
            `optim_done=${optimDone}`,
            `optim_total=${optimTotal}`,
            `manga_name=${mangaName}`,
            `chapter_num=${chapterNum}`,
            `output_size=${outputSize}`,
            `output_unit=${outputUnit}`
          ].join('\n');

          fs.appendFileSync(process.env.GITHUB_OUTPUT, output + '\n');

          console.log(`Parsed: Duration=${duration}s, Downloads=${downloadsDone}/${downloadsTotal}, Manga=${mangaName} Ch.${chapterNum}, Output=${outputSize}${outputUnit}`);

          // === MERGE status.json (cumulative totals ONLY) ===
          let status = {
            total_downloads: 0,
            total_duration: 0,
            total_output_mb: 0,
            total_chapters: 0,
            last_run: null,
            status: "Ready",
            icon: "🟢"
          };

          if (fs.existsSync('status.json')) {
            try {
              const existing = JSON.parse(fs.readFileSync('status.json', 'utf8'));
              status = { ...status, ...existing };
            } catch (e) { console.warn('Could not parse existing status.json:', e.message); }
          }

          // Merge cumulative values
          status.total_downloads = (status.total_downloads || 0) + parseInt(downloadsDone);
          status.total_duration = parseFloat((status.total_duration || 0) + parseFloat(duration)).toFixed(1);
          
          // Convert output to MB for consistent accumulation
          const sizeInMB = outputUnit === 'GB' ? parseFloat(outputSize) * 1024 : parseFloat(outputSize);
          status.total_output_mb = parseFloat((status.total_output_mb || 0) + sizeInMB).toFixed(2);

          // Add this run's chapter to the cumulative total (as a number)
          const chapNum = parseFloat(chapterNum);
          if (chapNum > 0) {
            status.total_chapters = (status.total_chapters || 0) + chapNum;
          }

          status.last_run = new Date().toISOString();
          status.timestamp = status.last_run;

          // Write merged status.json
          fs.writeFileSync('status.json', JSON.stringify(status, null, 2) + '\n');
          console.log('✅ status.json merged');

          // === UPDATE list.json (structured objects, numeric chapters, replace on duplicate) ===
          let mangaList = [];
          if (fs.existsSync('list.json')) {
            try {
              const existing = JSON.parse(fs.readFileSync('list.json', 'utf8'));
              mangaList = Array.isArray(existing) ? existing : (existing.items || []);
            } catch (e) { console.warn('Could not parse existing list.json:', e.message); }
          }

          if (mangaName && chapNum > 0) {
            const existingIndex = mangaList.findIndex(item => item.name === mangaName);
            
            if (existingIndex !== -1) {
              // Replace existing entry with new chapter number
              mangaList[existingIndex] = { name: mangaName, chapter: chapNum };
              console.log(`✅ Updated "${mangaName}" to chapter ${chapNum} in list.json`);
            } else {
              // Add new entry
              mangaList.push({ name: mangaName, chapter: chapNum });
              console.log(`✅ Added { name: "${mangaName}", chapter: ${chapNum} } to list.json`);
            }
            
            fs.writeFileSync('list.json', JSON.stringify({ items: mangaList }, null, 2) + '\n');
          } else if (mangaName) {
            console.log(`ℹ️ Manga "${mangaName}" has unknown chapter (?), skipping list.json update`);
          }
          EOF

      - name: Cleanup downloaded files
        run: |
          rm -rf node_modules/
          rm -f package-lock.json
          rm -rf *_ds.zip
          rm -rf *_cover.jpg
          rm -rf Miren_no_Tonbo/
          find . -type d -name "*_ds" -exec rm -rf {} + 2>/dev/null || true
          rm -f output.log

      - name: Commit Merged Status & List
        if: always()
        run: |
          git add status.json list.json 2>/dev/null || git add status.json
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: merge status + update manga list [skip ci]" || true
            git pull --rebase origin ${{ github.ref_name }} || true
            git push origin HEAD:${{ github.ref_name }} || true
          else
            echo "ℹ️ No changes to commit"
          fi
          
      - name: Summary
        if: success()
        run: |
          echo "## ✅ Process Complete" >> $GITHUB_STEP_SUMMARY
          echo "- 📤 Files sent directly to Telegram" >> $GITHUB_STEP_SUMMARY
          echo "- 🗑️ No artifacts saved (Telegram delivery only)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 This Run" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "⏱️ Duration: ${{ steps.summary.outputs.duration }}s" >> $GITHUB_STEP_SUMMARY
          echo "📥 Downloads: ${{ steps.summary.outputs.downloads_done }}/${{ steps.summary.outputs.downloads_total }}" >> $GITHUB_STEP_SUMMARY
          echo "🎨 Optimizations: ${{ steps.summary.outputs.optim_done }}/${{ steps.summary.outputs.optim_total }}" >> $GITHUB_STEP_SUMMARY
          echo "🔗 Manga: ${{ steps.summary.outputs.manga_name }} • Ch.${{ steps.summary.outputs.chapter_num }}" >> $GITHUB_STEP_SUMMARY
          echo "📦 Output: ${{ steps.summary.outputs.output_size }} ${{ steps.summary.outputs.output_unit }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📈 Cumulative Totals" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat status.json | node -e "const s=JSON.parse(require('fs').readFileSync(0,'utf8')); console.log(\`Total Downloads: \${s.total_downloads}\nTotal Duration: \${s.total_duration}s\nTotal Output: \${s.total_output_mb} MB\nTotal Chapters: \${s.total_chapters}\`)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
