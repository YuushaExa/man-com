name: Manga Downloader → Telegram

on:
  workflow_dispatch:
    inputs:
      json_file:
        description: 'Path to data.json file'
        required: false
        default: 'data.json'
      optimize_images:
        description: 'Optimize with Sharp (WebP, quality: 75, effort: 4)'
        required: false
        type: boolean
        default: true
  push:
    paths:
      - 'data.json'

jobs:
  download-and-send:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl zip
          npm install

      - name: Run downloader + Telegram sender
        id: downloader
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          node basic.js \
            "${{ github.event.inputs.json_file || 'data.json' }}" \
            "${{ github.event.inputs.optimize_images || true }}" 2>&1 | tee output.log

      - name: Parse Summary & Merge Status
        id: summary
        run: |
          # Parse values from output.log
          DURATION=$(grep -oP '⏱️ Duration: \K[0-9.]+' output.log | head -1 || echo "0")
          DOWNLOADS_DONE=$(grep -oP '📥 Downloads: \K[0-9]+' output.log | head -1 || echo "0")
          DOWNLOADS_TOTAL=$(grep -oP '📥 Downloads: [0-9]+/\K[0-9]+' output.log | head -1 || echo "0")
          OPTIM_DONE=$(grep -oP '🎨 Optimizations: \K[0-9]+' output.log | head -1 || echo "0")
          OPTIM_TOTAL=$(grep -oP '🎨 Optimizations: [0-9]+/\K[0-9]+' output.log | head -1 || echo "0")
          MANGA_LINE=$(grep -oP '🔗 Manga: \K.+' output.log | head -1 || echo "")
          MANGA_NAME=$(echo "$MANGA_LINE" | grep -oP '^[^\s•]+' | head -1 || echo "")
          CHAPTER_NUM=$(echo "$MANGA_LINE" | grep -oP 'Ch\.\K[0-9.]+' | head -1 || echo "")
          OUTPUT_SIZE=$(grep -oP '📦 Total output: \K[0-9.]+' output.log | head -1 || echo "0")
          OUTPUT_UNIT=$(grep -oP '📦 Total output: [0-9.]+\s*\K[MG]B' output.log | head -1 || echo "MB")

          # Output for GitHub Actions
          echo "duration=$DURATION" >> $GITHUB_OUTPUT
          echo "downloads_done=$DOWNLOADS_DONE" >> $GITHUB_OUTPUT
          echo "downloads_total=$DOWNLOADS_TOTAL" >> $GITHUB_OUTPUT
          echo "optim_done=$OPTIM_DONE" >> $GITHUB_OUTPUT
          echo "manga_name=$MANGA_NAME" >> $GITHUB_OUTPUT
          echo "chapter_num=$CHAPTER_NUM" >> $GITHUB_OUTPUT
          echo "output_size=$OUTPUT_SIZE" >> $GITHUB_OUTPUT
          echo "output_unit=$OUTPUT_UNIT" >> $GITHUB_OUTPUT

          # Use Node.js to merge status.json and update list.json
          node << 'EOF'
          const fs = require('fs');

          // Helper to read GITHUB_OUTPUT values
          const getOutput = (key) => {
            try {
              const content = fs.readFileSync(process.env.GITHUB_OUTPUT, 'utf8');
              const match = content.match(new RegExp(`^${key}=(.*)$`, 'm'));
              return match ? match[1] : '';
            } catch { return ''; }
          };

          // Read current run values
          const duration = parseFloat(getOutput('duration')) || 0;
          const downloadsDone = parseInt(getOutput('downloads_done')) || 0;
          const mangaName = getOutput('manga_name').trim();
          const chapterNum = parseFloat(getOutput('chapter_num')) || 0;
          const outputSize = parseFloat(getOutput('output_size')) || 0;
          const outputUnit = getOutput('output_unit') || 'MB';

          // === MERGE status.json (cumulative totals ONLY) ===
          let status = {
            total_downloads: 0,
            total_duration: 0,
            total_output_mb: 0,
            total_chapters: 0,
            last_run: null,
            status: "Ready",
            icon: "🟢"
          };

          if (fs.existsSync('status.json')) {
            try {
              const existing = JSON.parse(fs.readFileSync('status.json', 'utf8'));
              status = { ...status, ...existing };
            } catch (e) { console.warn('Could not parse existing status.json:', e.message); }
          }

          // Merge cumulative values
          status.total_downloads = (status.total_downloads || 0) + downloadsDone;
          status.total_duration = parseFloat((status.total_duration || 0) + duration).toFixed(1);
          
          // Convert output to MB for consistent accumulation
          const sizeInMB = outputUnit === 'GB' ? outputSize * 1024 : outputSize;
          status.total_output_mb = parseFloat((status.total_output_mb || 0) + sizeInMB).toFixed(2);

          // Add this run's chapter to the cumulative total (as a number)
          if (chapterNum > 0) {
            status.total_chapters = (status.total_chapters || 0) + chapterNum;
          }

          status.last_run = new Date().toISOString();
          status.timestamp = status.last_run;

          // Write merged status.json
          fs.writeFileSync('status.json', JSON.stringify(status, null, 2) + '\n');
          console.log('✅ status.json merged');

          // === UPDATE list.json (structured objects, numeric chapters, replace on duplicate) ===
          let mangaList = [];
          if (fs.existsSync('list.json')) {
            try {
              const existing = JSON.parse(fs.readFileSync('list.json', 'utf8'));
              mangaList = Array.isArray(existing) ? existing : (existing.items || []);
            } catch (e) { console.warn('Could not parse existing list.json:', e.message); }
          }

          if (mangaName && chapterNum > 0) {
            const existingIndex = mangaList.findIndex(item => item.name === mangaName);
            
            if (existingIndex !== -1) {
              // Replace existing entry with new chapter number
              mangaList[existingIndex] = { name: mangaName, chapter: chapterNum };
              console.log(`✅ Updated "${mangaName}" to chapter ${chapterNum} in list.json`);
            } else {
              // Add new entry
              mangaList.push({ name: mangaName, chapter: chapterNum });
              console.log(`✅ Added { name: "${mangaName}", chapter: ${chapterNum} } to list.json`);
            }
            
            fs.writeFileSync('list.json', JSON.stringify({ items: mangaList }, null, 2) + '\n');
          }
          EOF

      - name: Cleanup downloaded files
        run: |
          rm -rf node_modules/
          rm -f package-lock.json
          rm -rf *_ds.zip
          rm -rf *_cover.jpg
          rm -rf Miren_no_Tonbo/
          find . -type d -name "*_ds" -exec rm -rf {} + 2>/dev/null || true
          rm -f output.log

      - name: Commit Merged Status & List
        if: always()
        run: |
          git add status.json list.json 2>/dev/null || git add status.json
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: merge status + update manga list [skip ci]" || true
            git pull --rebase origin ${{ github.ref_name }} || true
            git push origin HEAD:${{ github.ref_name }} || true
          else
            echo "ℹ️ No changes to commit"
          fi
          
      - name: Summary
        if: success()
        run: |
          echo "## ✅ Process Complete" >> $GITHUB_STEP_SUMMARY
          echo "- 📤 Files sent directly to Telegram" >> $GITHUB_STEP_SUMMARY
          echo "- 🗑️ No artifacts saved (Telegram delivery only)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 This Run" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "⏱️ Duration: ${{ steps.summary.outputs.duration }}s" >> $GITHUB_STEP_SUMMARY
          echo "📥 Downloads: ${{ steps.summary.outputs.downloads_done }}/${{ steps.summary.outputs.downloads_total }}" >> $GITHUB_STEP_SUMMARY
          echo "🎨 Optimizations: ${{ steps.summary.outputs.optim_done }}/${{ steps.summary.outputs.optim_total }}" >> $GITHUB_STEP_SUMMARY
          echo "🔗 Manga: ${{ steps.summary.outputs.manga_name }} • Ch.${{ steps.summary.outputs.chapter_num }}" >> $GITHUB_STEP_SUMMARY
          echo "📦 Output: ${{ steps.summary.outputs.output_size }} ${{ steps.summary.outputs.output_unit }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📈 Cumulative Totals" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat status.json | node -e "const s=JSON.parse(require('fs').readFileSync(0,'utf8')); console.log(\`Total Downloads: \${s.total_downloads}\nTotal Duration: \${s.total_duration}s\nTotal Output: \${s.total_output_mb} MB\nTotal Chapters: \${s.total_chapters}\`)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
