name: Manga Downloader → Telegram

on:
  workflow_dispatch:
    inputs:
      json_file:
        description: 'Path to data.json file'
        required: false
        default: 'data.json'
      optimize_images:
        description: 'Optimize with Sharp (WebP, quality: 75, effort: 4)'
        required: false
        type: boolean
        default: true
  push:
    paths:
      - 'data.json'

jobs:
  download-and-send:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl zip
          npm install

      - name: Run downloader + Telegram sender
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          node basic.js \
            "${{ github.event.inputs.json_file || 'data.json' }}" \
            "${{ github.event.inputs.optimize_images || true }}"

      # ✅ Extract manga metadata once (for reuse in retry loop)
      - name: Extract manga metadata
        id: extract-manga
        run: |
          node << 'EOF' > /tmp/manga_meta.json
            const fs = require('fs');
            const jsonFile = process.env.JSON_FILE || 'data.json';
            const data = JSON.parse(fs.readFileSync(jsonFile, 'utf8'));
            const manga = data.manga || {};
            
            function extractMangaId(url) {
              if (!url) return null;
              const match = String(url).trim().match(/\/title\/([^-\s\/]+)/);
              return match ? match[1] : null;
            }
            
            function cleanChapterString(val) {
              if (val === null || val === undefined) return "?";
              let str = String(val).trim();
              if (!str || ['?','n/a','unknown'].includes(str.toLowerCase())) return "?";
              return str.replace(',', '.');
            }
            
            const mangaId = extractMangaId(manga.url);
            const rawChapter = manga.latest_chapter ?? manga.latestChapter ?? manga.chapter;
            const chapterStr = cleanChapterString(rawChapter);
            
            console.log(JSON.stringify({ mangaId, chapterStr, title: manga.title || 'Unknown' }));
          EOF
          # Output for GitHub Actions
          META=$(cat /tmp/manga_meta.json)
          echo "mangaId=$(echo "$META" | jq -r '.mangaId // empty')" >> $GITHUB_OUTPUT
          echo "chapterStr=$(echo "$META" | jq -r '.chapterStr')" >> $GITHUB_OUTPUT
          echo "title=$(echo "$META" | jq -r '.title')" >> $GITHUB_OUTPUT
          # Also save for shell access
          echo "$META" > /tmp/manga_meta.json
        env:
          JSON_FILE: '${{ github.event.inputs.json_file || 'data.json' }}'

      # ✅ Update list.json with smart retry (rebase from start)
      - name: Update list.json with smart retry
        env:
          JSON_FILE: '${{ github.event.inputs.json_file || 'data.json' }}'
          MANGA_ID: '${{ steps.extract-manga.outputs.mangaId }}'
          CHAPTER_STR: '${{ steps.extract-manga.outputs.chapterStr }}'
          MANGA_TITLE: '${{ steps.extract-manga.outputs.title }}'
        run: |
          # Skip if no manga ID to update
          if [ -z "$MANGA_ID" ] || [ "$MANGA_ID" = "null" ]; then
            echo "⚠️ No mangaId to update, skipping list.json"
            exit 0
          fi
          
          echo "📚 Processing: $MANGA_TITLE (ID: $MANGA_ID, Chapter: $CHAPTER_STR)"
          
          MAX_RETRIES=5
          RETRY=0
          
          while [ $RETRY -lt $MAX_RETRIES ]; do
            echo "🔄 Attempt $((RETRY+1))/$MAX_RETRIES: Updating list.json"
            
            # 🔁 STEP 1: Fetch latest remote state
            git fetch origin ${{ github.ref_name }}
            
            # 🔁 STEP 2: Reset list.json to remote version (critical for merge correctness)
            if git show origin/${{ github.ref_name }}:list.json > list.json 2>/dev/null; then
              echo "📥 Loaded latest list.json from remote"
            else
              echo "ℹ️ list.json doesn't exist remotely, starting fresh"
              echo "{}" > list.json
            fi
            
            # 🔁 STEP 3: Re-apply merge logic idempotently via Node.js
            node << NODEEOF
              const fs = require('fs');
              
              const mangaId = process.env.MANGA_ID;
              const chapterStr = process.env.CHAPTER_STR;
              
              // Re-read list.json (now at latest remote version)
              let list = {};
              try {
                const raw = fs.readFileSync('list.json', 'utf8').trim();
                if (raw) list = JSON.parse(raw);
              } catch (e) {
                console.warn('⚠️ Could not parse list.json, starting fresh');
                list = {};
              }
              
              // Helper: parse chapter to number for comparison
              function parseChapterToNumber(val) {
                if (val == null) return null;
                let str = String(val).trim().toLowerCase();
                if (!str || ['?','n/a','unknown'].includes(str)) return null;
                str = str.replace(',', '.');
                const match = str.match(/([0-9]+(?:\.[0-9]+)?)/);
                if (!match) return null;
                const num = parseFloat(match[1]);
                return isNaN(num) || num < 0 ? null : num;
              }
              
              const existingStr = list[mangaId];
              const existingNum = parseChapterToNumber(existingStr);
              const newNum = parseChapterToNumber(chapterStr);
              
              let shouldUpdate = false;
              
              if (existingStr === undefined) {
                shouldUpdate = true;
                console.log(\`📝 Added \${mangaId} → "\${chapterStr}"\`);
              } else if (newNum !== null && existingNum !== null) {
                if (newNum > existingNum) {
                  shouldUpdate = true;
                  console.log(\`📝 Updated \${mangaId} → "\${chapterStr}" (was "\${existingStr}")\`);
                } else {
                  console.log(\`ℹ️ \${mangaId} unchanged (\${newNum} ≤ \${existingNum})\`);
                }
              } else if (existingNum === null && newNum !== null) {
                shouldUpdate = true;
                console.log(\`📝 Updated \${mangaId} → "\${chapterStr}" (was unknown)\`);
              } else {
                console.log(\`ℹ️ \${mangaId} no update needed\`);
              }
              
              if (shouldUpdate) {
                list[mangaId] = chapterStr.trim();
                fs.writeFileSync('list.json', JSON.stringify(list, null, 2));
                console.log('✅ list.json prepared for commit');
              } else {
                // Ensure file exists even if no change
                if (!fs.existsSync('list.json')) {
                  fs.writeFileSync('list.json', JSON.stringify(list, null, 2));
                }
              }
            NODEEOF
            
            # 🔁 STEP 4: Try to commit and push
            git add list.json
            if ! git diff --cached --quiet; then
              git commit -m "chore: update \${MANGA_ID} → \${CHAPTER_STR} [skip ci]"
              
              if git push origin HEAD:${{ github.ref_name }}; then
                echo "✅ Successfully pushed list.json on attempt $((RETRY+1))"
                exit 0
              else
                echo "❌ Push failed (likely conflict), retrying..."
                RETRY=$((RETRY+1))
                sleep $((RETRY * 2))  # Exponential backoff: 2s, 4s, 6s...
                continue
              fi
            else
              echo "ℹ️ No changes to commit for list.json"
              exit 0
            fi
          done
          
          echo "❌ Failed to push list.json after $MAX_RETRIES attempts"
          exit 1

      - name: Commit any remaining list.json changes (fallback)
        # Only runs if the retry step didn't exit early (safety net)
        if: always()
        run: |
          git add list.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: fallback list.json update [skip ci]" || true
            git pull --rebase origin ${{ github.ref_name }} || true
            git push origin HEAD:${{ github.ref_name }} || true
          fi

      - name: Cleanup downloaded files
        run: |
          rm -rf node_modules/
          rm -f package-lock.json
          rm -rf *_ds.zip
          rm -rf *_cover.jpg
          rm -rf Miren_no_Tonbo/
          find . -type d -name "*_ds" -exec rm -rf {} + 2>/dev/null || true

      - name: Summary
        if: success()
        run: |
          echo "## ✅ Process Complete" >> $GITHUB_STEP_SUMMARY
          echo "- 📤 Files sent to Telegram" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Tracked Chapters (list.json)" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat list.json 2>/dev/null || echo '{}' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
