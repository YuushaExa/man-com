name: Manga Downloader → Telegram

on:
  workflow_dispatch:
    inputs:
      json_file:
        description: 'Path to data.json file'
        required: false
        default: 'data.json'
      optimize_images:
        description: 'Optimize with Sharp (WebP, quality: 75, effort: 4)'
        required: false
        type: boolean
        default: true
  push:
    paths:
      - 'data.json'

jobs:
  download-and-send:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update Status Processing
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "{\"status\": \"Processing\", \"icon\": \"🔴\", \"timestamp\": \"$TIMESTAMP\"}" > status.json
          git add status.json
          git diff --cached --quiet || git commit -m "chore: status processing [skip ci]"
          git pull --rebase origin ${{ github.ref_name }} || true
          git push origin HEAD:${{ github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl zip
          npm install

      - name: Run downloader + Telegram sender
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          node basic.js \
            "${{ github.event.inputs.json_file || 'data.json' }}" \
            "${{ github.event.inputs.optimize_images || true }}"

      - name: Cleanup downloaded files
        run: |
          rm -rf node_modules/
          rm -rf *_ds.zip
          rm -rf *_cover.jpg
          rm -rf Miren_no_Tonbo/
          find . -type d -name "*_ds" -exec rm -rf {} + 2>/dev/null || true

      - name: Update Status Final
        if: always()
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          if [ "${{ job.status }}" == "success" ]; then
            echo "{\"status\": \"Ready\", \"icon\": \"🟢\", \"timestamp\": \"$TIMESTAMP\"}" > status.json
            git commit -m "chore: status ready [skip ci]" || true
          else
            echo "{\"status\": \"Failed\", \"icon\": \"❌\", \"timestamp\": \"$TIMESTAMP\"}" > status.json
            git commit -m "chore: status failed [skip ci]" || true
          fi
          git add status.json
          git pull --rebase origin ${{ github.ref_name }} || true
          git push origin HEAD:${{ github.ref_name }}

      - name: Summary
        if: success()
        run: |
          echo "## ✅ Process Complete" >> $GITHUB_STEP_SUMMARY
          echo "- 📤 Files sent directly to Telegram" >> $GITHUB_STEP_SUMMARY
          echo "- 🗑️ No artifacts saved (Telegram delivery only)" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event.inputs.optimize_images || true }}" = "true" ]; then
            echo "- 🎨 Optimization: Sharp WebP (quality: 75, effort: 4, ds suffix)" >> $GITHUB_STEP_SUMMARY
          fi
