name: Manga Downloader → Telegram

on:
  workflow_dispatch:
    inputs:
      json_file:
        description: 'Path to data.json file'
        required: false
        default: 'data.json'
      optimize_images:
        description: 'Optimize with Sharp (WebP, quality: 75, effort: 4)'
        required: false
        type: boolean
        default: true
  push:
    paths:
      - 'data.json'

jobs:
  download-and-send:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl zip
          npm install

      - name: Run downloader + Telegram sender
        id: downloader
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          node basic.js \
            "${{ github.event.inputs.json_file || 'data.json' }}" \
            "${{ github.event.inputs.optimize_images || true }}" 2>&1 | tee output.log

      - name: Parse Summary
        id: summary
        run: |
          # Debug: show what's in output.log
          echo "=== Debug: output.log contents ==="
          grep -E '⏱️|📥|📦|🔗' output.log || echo "No matches found"
          echo "=================================="
          
          # Parse from output.log (matches basic.js console output format)
          DURATION=$(grep -oP '⏱️\s*Total time:\s*\K[0-9.]+' output.log | head -1)
          DOWNLOADS=$(grep -oP '📥\s*Downloads:\s*\K[0-9]+' output.log | head -1)
          TOTAL_OUTPUT=$(grep -oP '📦\s*Total output size:\s*\K[0-9.]+' output.log | head -1)
          MANGA_ID=$(grep -oP '🔗\s*Manga:\s*\K[a-zA-Z0-9_-]+' output.log | head -1)
          CHAPTER=$(grep -oP '🔗\s*Manga:.*•\s*Ch\.\K[0-9]+' output.log | head -1)
          
          # Fallback defaults (ensure empty = 0, not empty string)
          DURATION=${DURATION:-0}
          DOWNLOADS=${DOWNLOADS:-0}
          TOTAL_OUTPUT=${TOTAL_OUTPUT:-0}
          MANGA_ID=${MANGA_ID:-N/A}
          CHAPTER=${CHAPTER:-0}
          
          echo "Parsed: duration=$DURATION, downloads=$DOWNLOADS, output=$TOTAL_OUTPUT, manga=$MANGA_ID, chapter=$CHAPTER"
          
          echo "duration=$DURATION" >> $GITHUB_OUTPUT
          echo "downloads=$DOWNLOADS" >> $GITHUB_OUTPUT
          echo "manga_id=$MANGA_ID" >> $GITHUB_OUTPUT
          echo "chapter=$CHAPTER" >> $GITHUB_OUTPUT
          echo "total_output=$TOTAL_OUTPUT" >> $GITHUB_OUTPUT

      - name: Merge status.json and list.json
        run: |
          node << 'EOF'
            const fs = require('fs');
            
            // === Update status.json (ALL cumulative stats) ===
            let status = {};
            if (fs.existsSync('status.json')) {
              try {
                status = JSON.parse(fs.readFileSync('status.json', 'utf8'));
              } catch (e) {
                console.log('⚠️ Could not parse status.json, starting fresh');
              }
            }
            
            // Parse as FLOATS (not strings!) - handle empty/invalid gracefully
            const newDownloads = parseFloat('${{ steps.summary.outputs.downloads }}') || 0;
            const newDuration = parseFloat('${{ steps.summary.outputs.duration }}') || 0;
            const newOutput = parseFloat('${{ steps.summary.outputs.total_output }}') || 0;
            const newChapter = parseInt('${{ steps.summary.outputs.chapter }}') || 0;
            
            // Get existing values as numbers (coerce strings to numbers)
            const oldDownloads = parseFloat(status.total_downloads) || 0;
            const oldDuration = parseFloat(status.total_duration) || 0;
            const oldOutput = parseFloat(status.total_output) || 0;
            const oldChapters = parseFloat(status.total_chapters) || 0;
            
            // Merge ALL cumulative values (proper number addition)
            status.total_downloads = oldDownloads + newDownloads;
            status.total_duration = oldDuration + newDuration;
            status.total_output = oldOutput + newOutput;
            status.total_chapters = oldChapters + newChapter;
            status.last_updated = new Date().toISOString();
            
            // Clean up old fields from previous workflow versions
            delete status.status;
            delete status.icon;
            delete status.timestamp;
            delete status.last_run;
            delete status.latest_chapter;
            delete status.total_output_mb;
            delete status.summary;
            
            fs.writeFileSync('status.json', JSON.stringify(status, null, 2));
            console.log('✅ Updated status.json');
            console.log(JSON.stringify(status, null, 2));
            
            // === Update list.json (manga: highest chapter, deduplicated) ===
            let list = {};
            if (fs.existsSync('list.json')) {
              try {
                list = JSON.parse(fs.readFileSync('list.json', 'utf8'));
              } catch (e) {
                console.log('⚠️ Could not parse list.json, starting fresh');
              }
            }
            
            const mangaId = '${{ steps.summary.outputs.manga_id }}';
            const chapter = parseInt('${{ steps.summary.outputs.chapter }}');
            
            console.log(`Debug: mangaId="${mangaId}", chapter=${chapter}`);
            
            if (mangaId && mangaId !== 'N/A' && chapter > 0) {
              // Only update if chapter is higher than stored (deduplication)
              const existingChapter = parseInt(list[mangaId]) || 0;
              if (existingChapter < chapter) {
                list[mangaId] = chapter;
                console.log(`📝 Updated ${mangaId} → chapter ${chapter} (was ${existingChapter})`);
              } else {
                console.log(`ℹ️ ${mangaId} already at ${existingChapter}, skipping`);
              }
            } else {
              console.log(`⚠️ Skipping list.json update: mangaId="${mangaId}", chapter=${chapter}`);
            }
            
            fs.writeFileSync('list.json', JSON.stringify(list, null, 2));
            console.log('✅ Updated list.json');
            console.log(JSON.stringify(list, null, 2));
          EOF
          
          # Commit changes only if files were modified
          git add status.json list.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: merge stats + update chapters [skip ci]" || true
            git pull --rebase origin ${{ github.ref_name }} || true
            git push origin HEAD:${{ github.ref_name }} || true
          else
            echo "ℹ️ No changes to commit"
          fi

      - name: Cleanup downloaded files
        run: |
          rm -rf node_modules/
          rm -f package-lock.json
          rm -rf *_ds.zip
          rm -rf *_cover.jpg
          rm -rf Miren_no_Tonbo/
          find . -type d -name "*_ds" -exec rm -rf {} + 2>/dev/null || true
          rm -f output.log

      - name: Summary
        if: success()
        run: |
          echo "## ✅ Process Complete" >> $GITHUB_STEP_SUMMARY
          echo "- 📤 Files sent directly to Telegram" >> $GITHUB_STEP_SUMMARY
          echo "- 🗑️ No artifacts saved (Telegram delivery only)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 This Run Summary" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "⏱️ Duration: ${{ steps.summary.outputs.duration }}s" >> $GITHUB_STEP_SUMMARY
          echo "📥 Downloads: ${{ steps.summary.outputs.downloads }}" >> $GITHUB_STEP_SUMMARY
          echo "🎨 Optimizations: ${{ steps.summary.outputs.downloads }}" >> $GITHUB_STEP_SUMMARY
          echo "📦 Output: ${{ steps.summary.outputs.total_output }} MB" >> $GITHUB_STEP_SUMMARY
          echo "🔗 Manga: ${{ steps.summary.outputs.manga_id }} • Ch.${{ steps.summary.outputs.chapter }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📈 Cumulative Stats (status.json)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat status.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📚 Manga List (list.json)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat list.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
