name: Manga Downloader → Telegram

on:
  workflow_dispatch:
    inputs:
      json_file:
        description: 'Path to data.json file'
        required: false
        default: 'data.json'
      optimize_images:
        description: 'Optimize with Sharp (WebP, quality: 75, effort: 4)'
        required: false
        type: boolean
        default: true
  push:
    paths:
      - 'data.json'

jobs:
  download-and-send:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # ✅ Enable union merge for list.json to reduce conflicts
          git config merge.ours.driver true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl zip
          npm install

      - name: Run downloader + Telegram sender
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          node basic.js \
            "${{ github.event.inputs.json_file || 'data.json' }}" \
            "${{ github.event.inputs.optimize_images || true }}"

      # ✅ UPDATED: Pull latest BEFORE updating to minimize stale reads
      - name: Update list.json (conflict-safe)
        run: |
          # 🔄 Pull latest list.json before reading/writing
          git pull origin ${{ github.ref_name }} --no-rebase 2>/dev/null || true
          
          node << 'EOF'
            const fs = require('fs');
            
            const jsonFile = '${{ github.event.inputs.json_file || 'data.json' }}';
            let data;
            try {
              data = JSON.parse(fs.readFileSync(jsonFile, 'utf8'));
            } catch (e) {
              console.error(`❌ Failed to read ${jsonFile}: ${e.message}`);
              process.exit(1);
            }
            
            const manga = data.manga || {};
            
            function extractMangaId(url) {
              if (!url) return null;
              const match = String(url).trim().match(/\/title\/([^-\s\/]+)/);
              return match ? match[1] : null;
            }
            
            function parseChapterToNumber(val) {
              if (val === null || val === undefined) return null;
              let str = String(val).trim().toLowerCase();
              if (str === '' || str === '?' || str === 'n/a' || str === 'unknown') return null;
              str = str.replace(',', '.');
              const match = str.match(/([0-9]+(?:\.[0-9]+)?)/);
              if (!match) return null;
              const num = parseFloat(match[1]);
              return isNaN(num) || num < 0 ? null : num;
            }
            
            function cleanChapterString(val) {
              if (val === null || val === undefined) return "?";
              let str = String(val).trim();
              if (str === '' || str.toLowerCase() === '?' || str.toLowerCase() === 'n/a') return "?";
              return str.replace(',', '.');
            }
            
            const mangaId = extractMangaId(manga.url);
            const rawChapter = manga.latest_chapter ?? manga.latestChapter ?? manga.chapter;
            const chapterNum = parseChapterToNumber(rawChapter);
            const chapterStr = cleanChapterString(rawChapter);
            
            // ✅ Load list.json (just pulled, so fresher)
            let list = {};
            if (fs.existsSync('list.json')) {
              try {
                const parsed = JSON.parse(fs.readFileSync('list.json', 'utf8'));
                if (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) {
                  list = parsed;
                }
              } catch (e) {
                console.log('⚠️ Could not parse list.json, starting fresh');
              }
            }
            
            if (mangaId) {
              const existingStr = list[mangaId];
              const existingNum = parseChapterToNumber(existingStr);
              let shouldUpdate = false;
              
              if (existingStr === undefined) {
                shouldUpdate = true;
                console.log(`📝 Added ${mangaId} → "${chapterStr}"`);
              } else if (chapterNum !== null && existingNum !== null) {
                if (chapterNum > existingNum) {
                  shouldUpdate = true;
                  console.log(`📝 Updated ${mangaId} → "${chapterStr}" (was "${existingStr}")`);
                } else {
                  console.log(`ℹ️ ${mangaId} unchanged (${chapterNum} ≤ ${existingNum})`);
                }
              } else if (existingNum === null && chapterNum !== null) {
                shouldUpdate = true;
                console.log(`📝 Updated ${mangaId} → "${chapterStr}" (was unknown)`);
              }
              
              if (shouldUpdate) {
                list[mangaId] = chapterStr;
                // ✅ Write with trailing newline for cleaner git diffs
                fs.writeFileSync('list.json', JSON.stringify(list, null, 2) + '\n');
                console.log('✅ list.json updated');
              }
            } else {
              console.log('⚠️ Could not extract mangaId, skipping list.json update');
            }
          EOF

      # ✅ UPDATED: Commit + Push with exponential backoff retry
      - name: Commit list.json with conflict retry
        run: |
          git add list.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update tracked chapters [skip ci]"
            
            # 🔄 Exponential backoff retry for concurrent pushes
            max_attempts=5
            for attempt in $(seq 1 $max_attempts); do
              echo "🔄 Push attempt $attempt/$max_attempts"
              
              # Pull with rebase; if conflict, accept OURS (we just computed correct state)
              if git pull --rebase --strategy-option=ours origin ${{ github.ref_name }} 2>/dev/null; then
                if git push origin HEAD:${{ github.ref_name }} 2>/dev/null; then
                  echo "✅ Push successful"
                  exit 0
                fi
              else
                echo "⚠️ Rebase had conflicts, attempting push anyway..."
                if git push origin HEAD:${{ github.ref_name }} 2>/dev/null; then
                  echo "✅ Push successful after rebase"
                  exit 0
                fi
              fi
              
              if [ $attempt -eq $max_attempts ]; then
                echo "⚠️ Failed to push list.json after $max_attempts attempts (non-fatal)"
                # ✅ Don't fail workflow - core job (download+TG) already succeeded
                exit 0
              fi
              
              # ⏱️ Exponential backoff: 2s, 4s, 8s, 16s
              sleep $((2 ** attempt))
            done
          else
            echo "ℹ️ No changes to list.json"
          fi

      - name: Cleanup downloaded files
        run: |
          rm -rf node_modules/
          rm -f package-lock.json
          rm -rf *_ds.zip
          rm -rf *_cover.jpg
          rm -rf Miren_no_Tonbo/
          find . -type d -name "*_ds" -exec rm -rf {} + 2>/dev/null || true

      - name: Summary
        if: success()
        run: |
          echo "## ✅ Process Complete" >> $GITHUB_STEP_SUMMARY
          echo "- 📤 Files sent to Telegram" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Tracked Chapters (list.json)" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat list.json 2>/dev/null || echo '{}' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
