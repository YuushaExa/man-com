name: Manga Downloader → Telegram

on:
  workflow_dispatch:
    inputs:
      json_file:
        description: 'Path to data.json file'
        required: false
        default: 'data.json'
      optimize_images:
        description: 'Optimize with Sharp (WebP, quality: 75, effort: 4)'
        required: false
        type: boolean
        default: true
  push:
    paths:
      - 'data.json'

jobs:
  download-and-send:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update Status Processing
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          cat > status.json << EOF
          {
            "status": "Processing",
            "icon": "🔴",
            "timestamp": "$TIMESTAMP",
            "summary": null
          }
          EOF
          git add status.json
          git commit -m "chore: status processing [skip ci]" || true
          git push origin HEAD:${{ github.ref_name }} || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl zip
          npm install

      - name: Run downloader + Telegram sender
        id: downloader
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          node basic.js \
            "${{ github.event.inputs.json_file || 'data.json' }}" \
            "${{ github.event.inputs.optimize_images || true }}" 2>&1 | tee output.log

      - name: Parse Summary
        id: summary
        run: |
          DOWNLOADS=$(grep -oP '📥 Downloads: \K[0-9]+/[0-9]+' output.log | head -1 || echo "0/0")
          OPTIMIZATIONS=$(grep -oP '🎨 Optimizations: \K[0-9]+/[0-9]+' output.log | head -1 || echo "0/0")
          TOTAL_TIME=$(grep -oP '⏱️  Total time: \K[0-9.]+s' output.log | head -1 || echo "0s")
          echo "downloads=$DOWNLOADS" >> $GITHUB_OUTPUT
          echo "optimizations=$OPTIMIZATIONS" >> $GITHUB_OUTPUT
          echo "total_time=$TOTAL_TIME" >> $GITHUB_OUTPUT

      - name: Cleanup downloaded files
        run: |
          rm -rf node_modules/
          rm -f package-lock.json
          rm -rf *_ds.zip
          rm -rf *_cover.jpg
          rm -rf Miren_no_Tonbo/
          find . -type d -name "*_ds" -exec rm -rf {} + 2>/dev/null || true
          rm -f output.log

      - name: Update Status Final
        if: always()
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          if [ "${{ job.status }}" == "success" ]; then
            STATUS="Ready"
            ICON="🟢"
          else
            STATUS="Failed"
            ICON="❌"
          fi
          
          cat > status.json << EOF
          {
            "status": "$STATUS",
            "icon": "$ICON",
            "timestamp": "$TIMESTAMP",
            "summary": {
              "downloads": "${{ steps.summary.outputs.downloads }}",
              "optimizations": "${{ steps.summary.outputs.optimizations }}",
              "total_time": "${{ steps.summary.outputs.total_time }}"
            }
          }
          EOF
          
          git add status.json
          git commit -m "chore: status $STATUS [skip ci]" || true
          git pull --rebase origin ${{ github.ref_name }} || true
          git push origin HEAD:${{ github.ref_name }} || true

      - name: Summary
        if: success()
        run: |
          echo "## ✅ Process Complete" >> $GITHUB_STEP_SUMMARY
          echo "- 📤 Files sent directly to Telegram" >> $GITHUB_STEP_SUMMARY
          echo "- 🗑️ No artifacts saved (Telegram delivery only)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Optimization Summary" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "📥 Downloads: ${{ steps.summary.outputs.downloads }}" >> $GITHUB_STEP_SUMMARY
          echo "🎨 Optimizations: ${{ steps.summary.outputs.optimizations }}" >> $GITHUB_STEP_SUMMARY
          echo "⏱️  Total time: ${{ steps.summary.outputs.total_time }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
