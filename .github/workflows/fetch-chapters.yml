# .github/workflows/download-image.yml
name: Download Image

on:
  workflow_dispatch:  # Allow manual trigger
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  download-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create download directory
        run: mkdir -p downloaded-assets

      - name: Download image with headers
        id: download
        run: |
          IMAGE_URL="https://j24n.wowpic2.store/ii/bEqPbYfoMT0GmkHlSmKfvDpQ5oEZU/03.webp"
          OUTPUT_PATH="downloaded-assets/03.webp"
          
          echo "Attempting to download: $IMAGE_URL"
          
          # Download with browser-like headers to avoid blocking
          if curl -L --retry 3 --retry-delay 5 --connect-timeout 10 \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -H "Accept: image/webp,image/apng,image/*,*/*;q=0.8" \
            -H "Accept-Language: en-US,en;q=0.9" \
            -H "Referer: https://j24n.wowpic2.store/" \
            -o "$OUTPUT_PATH" "$IMAGE_URL"; then
            echo "✓ Download succeeded"
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "✗ Download failed with exit code: $?"
            echo "success=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Verify downloaded file
        if: steps.download.outputs.success == 'true'
        run: |
          FILE="downloaded-assets/03.webp"
          if [ -f "$FILE" ] && [ -s "$FILE" ]; then
            echo "✓ File exists and is not empty"
            echo "File size: $(du -h "$FILE" | cut -f1)"
            echo "File type: $(file -b "$FILE")"
          else
            echo "✗ File verification failed"
            exit 1
          fi

      - name: Upload artifact (optional)
        if: steps.download.outputs.success == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-image
          path: downloaded-assets/03.webp
          retention-days: 7
