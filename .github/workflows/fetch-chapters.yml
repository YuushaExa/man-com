name: Fetch Manga Chapters (Playwright)

on:
  workflow_dispatch:

jobs:
  fetch-chapters:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright + dependencies
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Run fetch script
        id: fetch
        run: node scripts/fetch_with_playwright.js

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: manga-chapters-data
          path: data/chapters_93q1r.json
          retention-days: 7
