name: Fetch Manga Chapters

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches: [ main ]

jobs:
  fetch-chapters:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch chapters from API
        id: api_call
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "https://comix.to/api/v2/manga/93q1r/chapters?limit=100&page=1")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          echo "response<<EOF" >> $GITHUB_ENV
          echo "$BODY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
          # Basic validation
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "❌ API request failed with HTTP $HTTP_CODE"
            echo "$BODY"
            exit 1
          fi

      - name: Parse and display chapters
        run: |
          echo "✅ Successfully fetched $(echo "$response" | jq -r '.result.items | length') chapters"
          echo "### Chapter List" >> $GITHUB_STEP_SUMMARY
          echo "$response" | jq -r '.result.items[] | "- Chapter \(.number): \(.name) (\(.language))"' >> $GITHUB_STEP_SUMMARY

      - name: Save response to file (optional)
        run: |
          mkdir -p data
          echo "$response" | jq '.' > data/chapters_93q1r.json
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: manga-chapters-data
          path: data/chapters_93q1r.json
          retention-days: 7
