name: Comix Manga Downloader

on:
  workflow_dispatch:
    inputs:
      manga_url:
        description: "Comix manga URL"
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps
        run: |
          pip install requests

      - name: Run downloader
        run: |
          python downloader.py "${{ github.event.inputs.manga_url }}"

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: manga
          path: output/*.zip
