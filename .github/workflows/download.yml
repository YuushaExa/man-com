name: 📚 Download Manga

on:
  workflow_dispatch:
    inputs:
      manga_url:
        description: 'Comix.to manga URL (e.g., https://comix.to/title/93q1r-the-summoner)'
        required: true
        type: string
      start_chapter:
        description: 'Start chapter number (optional, e.g., 1 or 2.5)'
        required: false
        type: string
        default: '1'
      end_chapter:
        description: 'End chapter number (optional, leave empty for latest)'
        required: false
        type: string
      output_format:
        description: 'Output format: zip or rar'
        required: false
        type: choice
        default: 'rar'
        options:
          - zip
          - rar

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours max
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔧 Install rar (if needed)
        if: inputs.output_format == 'zip'
        run: |
          sudo apt-get update
          sudo apt-get install -y rar unzip

      - name: 🚀 Run downloader
        env:
          MANGA_URL: ${{ inputs.manga_url }}
          START_CHAPTER: ${{ inputs.start_chapter }}
          END_CHAPTER: ${{ inputs.end_chapter }}
          OUTPUT_FORMAT: ${{ inputs.output_format }}
        run: node src/index.js

      - name: 📤 Upload result artifact
        uses: actions/upload-artifact@v4
        with:
          name: manga-result
          path: result/
          retention-days: 9
          if-no-files-found: error
