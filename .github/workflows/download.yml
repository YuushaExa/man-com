name: Manga Downloader

on:
  workflow_dispatch:
    inputs:
      manga_code:
        description: "Manga code from comix.to URL"
        required: true

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install cloudscraper requests

      - name: Run downloader
        run: python downloader.py
        env:
          MANGA_CODE: ${{ github.event.inputs.manga_code }}

      - name: Upload manga zip
        uses: actions/upload-artifact@v4
        with:
          name: manga
          path: "*.zip"
