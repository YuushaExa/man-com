name: Personal Downloader → T

on:
  workflow_dispatch:
    inputs:
      json_file:
        description: 'Path to data.json file'
        required: false
        default: 'data.json'
      optimize_images:
        description: 'Optimize with Sharp (WebP, quality: 75, effort: 4)'
        required: false
        type: boolean
        default: true
  push:
    paths:
      - 'data.json'

jobs:
  download-and-send:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl zip
          npm install

      - name: Run downloader + Telegram sender
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          node basic.js \
            "${{ github.event.inputs.json_file || 'data.json' }}" \
            "${{ github.event.inputs.optimize_images || true }}"

      - name: Update list/ folder (String Format)
        run: |
          node << 'EOF'
            const fs = require('fs');
            const path = require('path');
            
            const jsonFile = '${{ github.event.inputs.json_file || 'data.json' }}';
            const listDir = 'list';
            
            if (!fs.existsSync(listDir)) {
              fs.mkdirSync(listDir, { recursive: true });
            }
            
            let data;
            try {
              data = JSON.parse(fs.readFileSync(jsonFile, 'utf8'));
            } catch (e) {
              console.error(`❌ Failed to read ${jsonFile}: ${e.message}`);
              process.exit(1);
            }
            
            const ga = data.ga || {};
            
            function extractgaId(url) {
              if (!url) return null;
              const match = String(url).trim().match(/\/title\/([^-\s\/]+)/);
              return match ? match[1] : null;
            }
            
            function parseChapterToNumber(val) {
              if (val === null || val === undefined) return null;
              let str = String(val).trim().toLowerCase();
              if (str === '' || str === '?' || str === 'n/a' || str === 'unknown') return null;
              str = str.replace(',', '.');
              const match = str.match(/([0-9]+(?:\.[0-9]+)?)/);
              if (!match) return null;
              const num = parseFloat(match[1]);
              return isNaN(num) || num < 0 ? null : num;
            }
            
            function cleanChapterString(val) {
              if (val === null || val === undefined) return "?";
              let str = String(val).trim();
              if (str === '' || str.toLowerCase() === '?' || str.toLowerCase() === 'n/a') return "?";
              return str.replace(',', '.');
            }
            
            const gaId = extractgaId(ga.url);
            const rawChapter = ga.latest_chapter ?? ga.latestChapter ?? ga.chapter;
            
            const chapterNum = parseChapterToNumber(rawChapter);
            const chapterStr = cleanChapterString(rawChapter);
            
            console.log(`📚 ga: ${ga.title || 'Unknown'}`);
            console.log(`🔗 ID: ${gaId || 'N/A'}`);
            console.log(`📖 Raw: "${rawChapter}" → Num: ${chapterNum} → Store: "${chapterStr}"`);
            
            if (!gaId) {
              console.log('⚠️  Could not extract gaId, skipping update');
              process.exit(0);
            }
            
            const listFilePath = path.join(listDir, `${gaId}.json`);
            
            let existingStr = undefined;
            if (fs.existsSync(listFilePath)) {
              try {
                const existingData = JSON.parse(fs.readFileSync(listFilePath, 'utf8'));
                existingStr = existingData[gaId];
              } catch (e) {
                console.log(`⚠️  Could not parse ${listFilePath}, treating as new`);
              }
            }
            
            const existingNum = parseChapterToNumber(existingStr);
            
            let shouldUpdate = false;
            
            if (existingStr === undefined) {
              shouldUpdate = true;
              console.log(`📝 Added ${gaId} → "${chapterStr}"`);
            } 
            else if (chapterNum !== null && existingNum !== null) {
              if (chapterNum > existingNum) {
                shouldUpdate = true;
                console.log(`📝 Updated ${gaId} → "${chapterStr}" (was "${existingStr}")`);
              } else {
                console.log(`ℹ️  ${gaId} unchanged (${chapterNum} ≤ ${existingNum})`);
              }
            } 
            else if (existingNum === null && chapterNum !== null) {
              shouldUpdate = true;
              console.log(`📝 Updated ${gaId} → "${chapterStr}" (was unknown)`);
            }
            
            if (shouldUpdate) {
              const output = { [gaId]: chapterStr };
              fs.writeFileSync(listFilePath, JSON.stringify(output, null, 2));
              console.log(`✅ Written: ${listFilePath}`);
            }
            
            console.log('✅ list/ folder update complete');
          EOF

      - name: Commit list/ changes
        run: |
          git add list/*.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update tracked chapters [skip ci]" || true
            git pull --rebase origin ${{ github.ref_name }} || true
            git push origin HEAD:${{ github.ref_name }} || true
          else
            echo "ℹ️  No changes to list/ folder"
          fi

      - name: Cleanup downloaded files
        run: |
          rm -rf node_modules/
          rm -f package-lock.json
          rm -rf *_ds.zip
          rm -rf *_cover.jpg
          find . -type d -name "*_ds" -exec rm -rf {} + 2>/dev/null || true
          
      - name: Trigger Merge Workflow
        if: success()
        run: |
          gh workflow run "Merge and Cleanup List Data" --ref ${{ github.ref_name }}
        env:
         GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
